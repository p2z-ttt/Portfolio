<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2Z — Tatouage</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/presentation/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/presentation/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/presentation/apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<meta name="theme-color" content="#efe7d6">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body data-page="accueil">

<header class="nav">
  <a class="brand" href="index.html" aria-label="Accueil">
    <img id="brand-logo" src="assets/presentation/logo.png" alt="P2Z" class="brand-logo">
  </a>
  <nav class="nav-links">
    <a href="index.html" class="active">Accueil</a>
    <a href="realisations.html">Réalisations</a>
    <a href="flashs.html">Flashs</a>
    <a href="creations.html">Créations</a>
  </nav>
  <button class="burger" aria-label="Ouvrir le menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<main class="home">
  <section class="hero">
    <div class="hero-text">
      <p class="kicker" data-bind="home.kicker"></p>
      <h1 class="display" data-bind="home.title"></h1>
      <p class="signature" data-bind-html="home.signature_html"></p>
      <div data-bind-paragraphs="home.bio_paragraphs"></div>

      <div class="hero-meta" id="hero-meta"></div>
    </div>

    <div class="hero-portrait">
      <img id="hero-portrait" alt="Portrait P2Z">
      <span class="hero-deco"></span>
    </div>
  </section>

  <section class="strip">
    <h2 class="section-title" data-bind="home.atelier.title"></h2>
    <div class="strip-grid" id="strip-grid"></div>
  </section>

  <section class="cta">
    <h2 class="section-title">EXPLORER</h2>
    <div class="cta-grid">
      <a class="cta-card" href="realisations.html">
        <span class="cta-num">01</span>
        <span class="cta-label">Réalisations</span>
        <span class="cta-arrow">→</span>
      </a>
      <a class="cta-card" href="flashs.html">
        <span class="cta-num">02</span>
        <span class="cta-label">Flashs</span>
        <span class="cta-arrow">→</span>
      </a>
      <a class="cta-card" href="creations.html">
        <span class="cta-num">03</span>
        <span class="cta-label">Créations</span>
        <span class="cta-arrow">→</span>
      </a>
    </div>
  </section>
</main>

<footer class="foot" id="footer"></footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
